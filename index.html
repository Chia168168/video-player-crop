<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Frame Player">
<meta name="theme-color" content="#0a0a0c">
<title>影片播放器</title>
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;600&display=swap');

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
–accent: #c8ff47;
–accent2: #47d4ff;
–text: #f0f0f4;
–muted: #888899;
}

html, body {
background: #000;
color: var(–text);
font-family: ‘Space Grotesk’, sans-serif;
height: 100%;
overflow: hidden;
position: fixed;
width: 100%;
}

/* ══ UPLOAD SCREEN ══ */
#upload-screen {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100dvh;
gap: 24px;
padding: 32px;
background: #0a0a0c;
}
.logo {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 0.3em;
color: var(–muted);
text-transform: uppercase;
}
.upload-zone {
width: 100%; max-width: 340px;
aspect-ratio: 16/10;
border: 1.5px dashed rgba(200,255,71,0.3);
border-radius: 16px;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 14px;
background: linear-gradient(135deg, rgba(200,255,71,0.03), rgba(71,212,255,0.03));
position: relative; overflow: hidden; cursor: pointer;
transition: border-color 0.2s, background 0.2s;
}
.upload-zone:active { border-color: var(–accent); background: rgba(200,255,71,0.07); }
.upload-zone::before {
content: ‘’; position: absolute; inset: 0;
background: radial-gradient(ellipse at 50% 120%, rgba(200,255,71,0.08) 0%, transparent 60%);
pointer-events: none;
}
.upload-icon {
width: 56px; height: 56px; border-radius: 14px;
background: rgba(200,255,71,0.1);
display: flex; align-items: center; justify-content: center;
}
.upload-icon svg { width: 28px; height: 28px; stroke: var(–accent); }
.upload-text { font-size: 15px; font-weight: 600; }
.upload-sub { font-size: 12px; color: var(–muted); font-family: ‘DM Mono’, monospace; }
#file-input {
position: absolute; inset: 0; width: 100%; height: 100%;
opacity: 0; cursor: pointer; z-index: 10; font-size: 16px;
}

/* ══ PLAYER SCREEN — true fullscreen ══ */
#player-screen {
display: none;
position: fixed; inset: 0;
background: #000;
}

#video-container {
position: absolute; inset: 0;
display: flex; align-items: center; justify-content: center;
background: #000;
overflow: hidden;
touch-action: none;
}
#video {
width: 100%; height: 100%;
display: block; object-fit: contain;
transform-origin: center center;
transition: none;
will-change: transform;
}

/* Tap zone over video */
#tap-overlay {
position: absolute; inset: 0;
z-index: 5; cursor: pointer;
}

/* ── Time info top-right ── */
#time-overlay {
position: absolute;
top: max(env(safe-area-inset-top, 0px), 8px);
right: 12px;
margin-top: 8px;
background: transparent;
padding: 5px 10px;
font-family: ‘DM Mono’, monospace;
font-size: 11px; color: rgba(255,255,255,0.75);
letter-spacing: 0.05em;
pointer-events: none;
line-height: 1.7; text-align: right;
z-index: 20;
transition: opacity 0.3s;
}
#time-display { color: rgba(255,255,255,0.85); }
#frame-display { color: rgba(255,255,255,0.5); font-size: 10px; }
#time-overlay.hidden { opacity: 0; }

/* ── Mini bar (visible when panel hidden) ── */
#mini-bar {
position: absolute;
bottom: max(env(safe-area-inset-bottom, 0px), 10px);
left: 0; right: 0;
z-index: 40;
display: none;
align-items: center;
justify-content: space-around;
background: transparent;
border: none;
padding: 6px 24px;
}
#mini-bar.show { display: flex; }

.mini-btn {
background: transparent;
border: none;
border-radius: 50%;
width: 52px; height: 52px;
display: flex; align-items: center; justify-content: center;
cursor: pointer;
flex-shrink: 0;
opacity: 0.7;
}
.mini-btn svg { width: 24px; height: 24px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.mini-btn:active { opacity: 1; transform: scale(0.88); }

#mini-play-btn { opacity: 0.85; }
#mini-play-btn svg { stroke: #fff; width: 28px; height: 28px; }

.mini-divider { display: none; }

#mini-expand {
opacity: 0.35;
font-size: 16px;
color: #fff;
padding: 0;
width: 44px; height: 44px;
display: flex; align-items: center; justify-content: center;
background: transparent;
border: none;
cursor: pointer;
line-height: 1;
flex-shrink: 0;
}

/* ══ FLOATING CONTROLS PANEL ══ */
#controls {
position: absolute; left: 0; right: 0; bottom: 0;
z-index: 30;
background: transparent;
padding-top: 32px;
padding-bottom: max(env(safe-area-inset-bottom, 0px), 6px);
transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
}
#controls.hidden {
transform: translateY(100%);
opacity: 0;
pointer-events: none;
}

/* Hide chevron pill at top of panel */
#hide-pill {
display: flex; justify-content: center;
margin-bottom: 2px;
}
#hide-pill button {
background: transparent;
border: none; border-radius: 100px;
padding: 3px 22px; cursor: pointer;
color: rgba(255,255,255,0.38); font-size: 16px; line-height: 1.3;
}

/* FPS row */
#fps-row {
display: flex; align-items: center;
padding: 6px 12px 8px;
border-bottom: none;
}
.fps-btns {
display: flex; gap: 6px; flex: 1;
overflow-x: auto; -webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.fps-btns::-webkit-scrollbar { display: none; }
.fps-btn {
flex-shrink: 0; padding: 5px 10px;
border-radius: 100px; border: 1.5px solid rgba(255,255,255,0.25);
background: transparent; color: rgba(255,255,255,0.75);
font-family: ‘DM Mono’, monospace; font-size: 13px;
cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.fps-btn.active {
background: transparent;
border-color: var(–accent2);
color: var(–accent2); font-weight: 500;
}
.fps-btn:active { opacity: 0.7; transform: scale(0.95); }

/* Speed row */
#speed-row {
display: flex; align-items: center;
padding: 6px 12px 8px;
border-bottom: none;
}
.speed-label {
font-size: 11px; font-family: ‘DM Mono’, monospace;
color: rgba(255,255,255,0.5); letter-spacing: 0.2em;
text-transform: uppercase; margin-right: 10px; white-space: nowrap;
}
.speed-btns {
display: flex; gap: 6px; flex: 1;
overflow-x: auto; -webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.speed-btns::-webkit-scrollbar { display: none; }
.speed-btn {
flex-shrink: 0; padding: 5px 11px;
border-radius: 100px; border: 1.5px solid rgba(255,255,255,0.25);
background: transparent; color: rgba(255,255,255,0.75);
font-family: ‘DM Mono’, monospace; font-size: 13px;
cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.speed-btn.active {
background: transparent; border-color: var(–accent);
color: var(–accent); font-weight: 500;
}
.speed-btn:active { opacity: 0.7; transform: scale(0.95); }

/* Playback row */
#playback-row {
display: flex; align-items: center; justify-content: center;
gap: 8px; padding: 10px 12px;
border-bottom: none;
}
.ctrl-btn {
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 3px;
background: transparent;
border: none;
border-radius: 12px; padding: 10px 12px;
cursor: pointer; transition: all 0.15s;
flex: 1; max-width: 72px; min-height: 54px;
}
.ctrl-btn svg { width: 22px; height: 22px; stroke: rgba(255,255,255,0.85); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.ctrl-btn span { font-size: 11px; font-family: ‘DM Mono’, monospace; color: rgba(255,255,255,0.6); letter-spacing: 0.05em; }
.ctrl-btn:active { opacity: 0.6; transform: scale(0.95); }

#play-btn {
background: transparent; border: none;
max-width: 80px; min-height: 60px;
}
#play-btn svg { stroke: #fff; width: 28px; height: 28px; }
#play-btn span { color: rgba(255,255,255,0.6); font-size: 11px; }
#play-btn:active { opacity: 0.7; transform: scale(0.95); }

.save-btn svg { stroke: rgba(255,255,255,0.85); }

/* Timeline */
#timeline-section {
padding: 8px 12px 10px;
display: flex; flex-direction: column; gap: 6px;
}
.timeline-label {
font-size: 10px; font-family: ‘DM Mono’, monospace;
color: var(–muted); letter-spacing: 0.15em; text-transform: uppercase;
display: flex; justify-content: space-between;
}
#progress-bar-wrap {
position: relative; height: 4px;
background: rgba(255,255,255,0.12);
border-radius: 2px; cursor: pointer;
}
#progress-fill {
height: 100%; background: var(–accent);
border-radius: 2px; width: 0%;
transition: width 0.08s linear;
}
#thumbnail-strip {
position: relative; height: 50px;
border-radius: 8px; overflow: hidden;
background: rgba(255,255,255,0.05);
border: 1px solid rgba(255,255,255,0.08);
cursor: pointer;
}
#thumb-canvas-strip {
display: flex; height: 100%; width: 100%;
position: absolute; top: 0; left: 0;
}
#thumb-canvas-strip canvas { flex-shrink: 0; height: 100%; object-fit: cover; }
#timeline-indicator {
position: absolute; top: 0; width: 2px; height: 100%;
background: var(–accent); pointer-events: none;
box-shadow: 0 0 6px var(–accent); z-index: 10;
}
#timeline-indicator::before {
content: ‘’; position: absolute; top: -4px; left: 50%;
transform: translateX(-50%);
width: 10px; height: 10px;
background: var(–accent); border-radius: 50%;
}
.thumb-loading {
color: var(–muted); font-size: 11px;
font-family: ‘DM Mono’, monospace; text-align: center; padding: 8px 0 0;
}

/* Loop range */
#loop-row {
display: flex; align-items: center; gap: 8px;
padding: 4px 12px 8px;
}
#loop-toggle {
background: transparent; border: 1.5px solid rgba(255,255,255,0.2);
border-radius: 100px; padding: 5px 12px;
color: rgba(255,255,255,0.5); font-family: ‘DM Mono’, monospace;
font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
transition: all 0.15s;
}
#loop-toggle.active {
border-color: var(–accent2); color: var(–accent2);
}
#loop-set-in, #loop-set-out {
background: transparent; border: 1.5px solid rgba(255,255,255,0.2);
border-radius: 100px; padding: 5px 10px;
color: rgba(255,255,255,0.5); font-family: ‘DM Mono’, monospace;
font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
transition: all 0.15s;
}
#loop-set-in.set { border-color: rgba(200,255,71,0.5); color: var(–accent); }
#loop-set-out.set { border-color: rgba(200,255,71,0.5); color: var(–accent); }
#loop-set-in:active, #loop-set-out:active, #loop-toggle:active, #loop-clear:active { opacity: 0.6; }

#loop-clear {
background: transparent; border: 1.5px solid rgba(255,255,255,0.2);
border-radius: 100px; padding: 5px 10px;
color: rgba(255,255,255,0.4); font-family: ‘DM Mono’, monospace;
font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
transition: all 0.15s;
}

#loop-export {
background: transparent; border: 1.5px solid rgba(200,255,71,0.3);
border-radius: 100px; padding: 5px 11px;
color: var(–accent); font-family: ‘DM Mono’, monospace;
font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
transition: all 0.15s;
}
#loop-export:active { opacity: 0.6; }
#loop-export:disabled { opacity: 0.3; cursor: not-allowed; }

#loop-convert {
background: transparent; border: 1.5px solid rgba(71,212,255,0.3);
border-radius: 100px; padding: 5px 11px;
color: var(–accent2); font-family: ‘DM Mono’, monospace;
font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
transition: all 0.15s;
}
#loop-convert:active { opacity: 0.6; }

#export-format {
background: transparent; border: 1.5px solid rgba(255,255,255,0.2);
border-radius: 100px; padding: 5px 8px;
color: rgba(255,255,255,0.6); font-family: ‘DM Mono’, monospace;
font-size: 12px; cursor: pointer; flex-shrink: 0;
-webkit-appearance: none; appearance: none;
text-align: center;
}
#export-format option { background: #1a1a1a; color: #fff; }

/* Export progress overlay */
#export-overlay {
display: none;
position: fixed; inset: 0; z-index: 99999;
background: rgba(0,0,0,0.85);
flex-direction: column; align-items: center; justify-content: center;
gap: 16px;
}
#export-overlay.show { display: flex; }
#export-overlay p {
color: #fff; font-family: ‘DM Mono’, monospace;
font-size: 14px; text-align: center; line-height: 1.6;
padding: 0 24px;
}
#export-progress-bar {
width: 240px; height: 6px;
background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden;
}
#export-progress-fill {
height: 100%; background: var(–accent);
border-radius: 3px; width: 0%;
transition: width 0.3s;
}
#export-cancel {
background: transparent; border: 1.5px solid rgba(255,255,255,0.25);
border-radius: 100px; padding: 7px 20px;
color: rgba(255,255,255,0.6); font-family: ‘DM Mono’, monospace;
font-size: 13px; cursor: pointer;
}

#loop-range-display {
flex: 1; font-family: ‘DM Mono’, monospace; font-size: 10px;
color: rgba(255,255,255,0.35); text-align: right; white-space: nowrap;
overflow: hidden; text-overflow: ellipsis;
}

/* Range overlay on thumbnail strip */
#loop-range-overlay {
position: absolute; top: 0; height: 100%;
background: rgba(200,255,71,0.15);
border-left: 2px solid var(–accent);
border-right: 2px solid var(–accent);
pointer-events: none; z-index: 8;
display: none;
}
#loop-range-overlay.show { display: block; }

/* Toast */
#toast {
position: fixed; bottom: 50px; left: 50%;
transform: translateX(-50%) translateY(14px);
background: rgba(15,15,22,0.92);
backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
border: 1px solid rgba(255,255,255,0.1);
color: var(–text); padding: 9px 18px;
border-radius: 100px; font-size: 13px;
font-family: ‘DM Mono’, monospace;
opacity: 0; pointer-events: none;
transition: all 0.25s; z-index: 9999; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

</head>

// ── Pinch zoom, pan & tap ──
(function() {
  const container = document.getElementById('video-container');
  const tapOverlay = document.getElementById('tap-overlay');
  const vid = document.getElementById('video');

  let scale = 1, posX = 0, posY = 0;
  let startScale = 1, startPosX = 0, startPosY = 0;
  let panStartX = 0, panStartY = 0;
  let lastTapTime = 0;
  let didMove = false;
  const MIN_SCALE = 1, MAX_SCALE = 8;

  function applyTransform(animate) {
    vid.style.transition = animate ? 'transform 0.25s ease' : 'none';
    vid.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
  }

  function clampPos() {
    if (scale <= 1) { posX = 0; posY = 0; return; }
    const maxX = (container.offsetWidth  * (scale - 1)) / 2;
    const maxY = (container.offsetHeight * (scale - 1)) / 2;
    posX = Math.max(-maxX, Math.min(maxX, posX));
    posY = Math.max(-maxY, Math.min(maxY, posY));
  }

  function midpoint(t1, t2) {
    return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
  }
  function dist(t1, t2) {
    const dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  tapOverlay.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      didMove = true;
      startScale = scale;
      startPosX = posX; startPosY = posY;
      const mid = midpoint(e.touches[0], e.touches[1]);
      panStartX = mid.x; panStartY = mid.y;
      container._startDist = dist(e.touches[0], e.touches[1]);
    } else if (e.touches.length === 1) {
      didMove = false;
      panStartX = e.touches[0].clientX - posX;
      panStartY = e.touches[0].clientY - posY;
      if (scale > 1) e.preventDefault();
    }
  }, { passive: false });

  tapOverlay.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      didMove = true;
      const d = dist(e.touches[0], e.touches[1]);
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, startScale * d / container._startDist));
      const mid = midpoint(e.touches[0], e.touches[1]);
      const rect = container.getBoundingClientRect();
      const cx = mid.x - rect.left - rect.width  / 2;
      const cy = mid.y - rect.top  - rect.height / 2;
      const prevCx = panStartX - rect.left - rect.width  / 2;
      const prevCy = panStartY - rect.top  - rect.height / 2;
      posX = cx - (prevCx - startPosX) * (newScale / startScale);
      posY = cy - (prevCy - startPosY) * (newScale / startScale);
      scale = newScale;
      clampPos();
      applyTransform(false);
    } else if (e.touches.length === 1 && scale > 1) {
      e.preventDefault();
      const dx = e.touches[0].clientX - (panStartX + posX);
      const dy = e.touches[0].clientY - (panStartY + posY);
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) didMove = true;
      posX = e.touches[0].clientX - panStartX;
      posY = e.touches[0].clientY - panStartY;
      clampPos();
      applyTransform(false);
    }
  }, { passive: false });

  tapOverlay.addEventListener('touchend', e => {
    if (e.touches.length < 2 && scale < 1.05) {
      scale = 1; posX = 0; posY = 0; applyTransform(true);
    }

    if (e.touches.length === 0) {
      const now = Date.now();
      if (!didMove) {
        // Double-tap: reset zoom
        if (now - lastTapTime < 300) {
          scale = 1; posX = 0; posY = 0; applyTransform(true);
        } else {
          // Single tap: play/pause
          togglePlay();
        }
      }
      lastTapTime = now;
      didMove = false;
    }
  }, { passive: true });
})();

  video.addEventListener('loadedmetadata', onMeta, { once: true });
  video.addEventListener('canplaythrough', function probe() {
    video.removeEventListener('canplaythrough', probe);
    if (!metaFired && video.duration > 0) onMeta();
  }, { once: true });

  // Stall detection — if nothing fires in 10s, show error
  const stallTimer = setTimeout(() => {
    if (!metaFired) {
      if (video.duration > 0) { onMeta(); return; }
      thumbStatus.textContent = '載入逾時，請重新選擇';
      showToast('載入逾時');
    }
  }, 10000);

  // Clear stall timer once loaded
  video.addEventListener('loadedmetadata', () => clearTimeout(stallTimer), { once: true });

  // Set src once, then load once
  video.src = currentBlobUrl;
  video.load();
}

async function parseFPS(file) {
  const fileSize = file.size;
  const TAIL = Math.min(8 * 1024 * 1024, fileSize);
  const HEAD = Math.min(4 * 1024 * 1024, fileSize);

  // Try head first (moov at front for some MP4)
  const headBuf = await readFileSlice(file, 0, HEAD);
  let result = scanBufferForFPS(headBuf, 0);
  if (result) return result;

  // Try tail (iPhone MOV: moov at end)
  if (fileSize > HEAD) {
    const tailStart = fileSize - TAIL;
    const tailBuf = await readFileSlice(file, tailStart, fileSize);
    result = scanBufferForFPS(tailBuf, tailStart);
    if (result) return result;
  }

  return null;
}

function scanBufferForFPS(buf, bufStart) {
  const view = new DataView(buf);
  const len = buf.byteLength;

  for (let i = 0; i + 8 <= len; i++) {
    if (view.getUint8(i)   === 0x6D &&
        view.getUint8(i+1) === 0x6F &&
        view.getUint8(i+2) === 0x6F &&
        view.getUint8(i+3) === 0x76) {
      if (i < 4) continue;
      const moovSize = readU32(view, i - 4);
      const moovEnd = Math.min(i - 4 + moovSize, len);
      const result = parseMoov(view, i + 4, moovEnd);
      if (result) return result;
    }
  }
  return null;
}

function parseMoov(view, start, end) {
  let off = start;
  while (off + 8 <= end) {
    const size = readU32(view, off);
    const name = read4cc(view, off + 4);
    if (size < 8) break;
    const childEnd = Math.min(off + size, end);
    if (name === 'trak') {
      const result = parseTrak(view, off + 8, childEnd);
      if (result) return result;
    }
    off += size;
  }
  return null;
}

function parseTrak(view, start, end) {
  let timescale = null, sampleDelta = null, isVideo = false;

  function walk(s, e) {
    let off = s;
    while (off + 8 <= e) {
      const size = readU32(view, off);
      const name = read4cc(view, off + 4);
      if (size < 8) break;
      const ce = Math.min(off + size, e);
      if (name === 'mdia' || name === 'minf' || name === 'stbl') {
        walk(off + 8, ce);
      } else if (name === 'mdhd') {
        timescale = parseMdhd(view, off + 8, ce);
      } else if (name === 'hdlr') {
        const h = parseHdlr(view, off + 8, ce);
        if (h) isVideo = true;
      } else if (name === 'stts') {
        sampleDelta = parseStts(view, off + 8, ce);
      }
      off += size;
    }
  }
  walk(start, end);

  if (isVideo && timescale && sampleDelta && sampleDelta > 0) {
    return timescale / sampleDelta;
  }
  return null;
}

function parseMdhd(view, start, end) {
  if (start + 4 > end) return null;
  const ver = view.getUint8(start);
  // version 0: [version(1)+flags(3)] + creation(4) + modification(4) + timescale(4)
  // version 1: [version(1)+flags(3)] + creation(8) + modification(8) + timescale(4)
  const tsOff = ver === 1 ? start + 4 + 8 + 8 : start + 4 + 4 + 4;
  if (tsOff + 4 > end) return null;
  return readU32(view, tsOff);
}

function parseHdlr(view, start, end) {
  if (start + 12 > end) return false;
  const h = read4cc(view, start + 8);
  return h === 'vide';
}

function parseStts(view, start, end) {
  // [version(1)+flags(3)] + entry_count(4) + [count(4)+delta(4)...]
  if (start + 8 > end) return null;
  const entryCount = readU32(view, start + 4);
  if (!entryCount) return null;
  // Pick the entry with the most samples (dominant frame interval)
  let bestDelta = 0, bestCount = 0;
  for (let i = 0; i < entryCount && i < 64; i++) {
    const base = start + 8 + i * 8;
    if (base + 8 > end) break;
    const count = readU32(view, base);
    const delta = readU32(view, base + 4);
    if (delta > 0 && count > bestCount) { bestCount = count; bestDelta = delta; }
  }
  return bestDelta || null;
}

function readU32(view, off) { return view.getUint32(off, false); }
function read4cc(view, off) {
  let s = '';
  for (let i = 0; i < 4; i++) s += String.fromCharCode(view.getUint8(off + i));
  return s;
}

function snapToCommonFPS(raw) {
  const common = [23.976, 24, 25, 29.97, 30, 48, 50, 59.94, 60, 90, 100, 119.88, 120, 240];
  let best = common[0], bestDiff = Infinity;
  for (const c of common) {
    const d = Math.abs(raw - c);
    if (d < bestDiff) { bestDiff = d; best = c; }
  }
  return bestDiff / raw < 0.06 ? best : Math.round(raw * 10) / 10;
}

function readFileSlice(file, start, end) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.onerror = reject;
    r.readAsArrayBuffer(file.slice(start, end));
  });
}

// ── Byte-range extraction: only read the bytes needed for the clip ──
async function extractClipBlob(file, clipIn, clipOut) {

    w32(b, 0, arr.length);
    arr.forEach((v,i) => w32(b, 4+i*4, v));

    let total = 0; for (const a of arrays) total += a.length;

  }}
  // stsc
  const newStsc=[]; for(let c=0;c<CC;c++){const n=spc(c0+c); if(!newStsc.length||n!==newStsc[newStsc.length-1][1]) newStsc.push([c+1,n,1]);}
  // stsz
  const newStsz = fixedSampleSize>0 ? null : Array.from({length:clipS1-clipS0},(_,i)=>ss(clipS0+i));
  // clip duration ticks
  let clipTicks=0; for(const [cnt,dlt] of newStts) clipTicks+=cnt*dlt;

  // ── build stbl boxes ──
  function mkStts() {
    const b = new Uint8Array(8 + newStts.length*8); w32(b,4,newStts.length);
    newStts.forEach(([c,d],i)=>{w32(b,8+i*8,c);w32(b,8+i*8+4,d);}); return box('stts',b);
  }
  function mkStsc() {
    const b = new Uint8Array(8 + newStsc.length*12); w32(b,4,newStsc.length);
    newStsc.forEach(([f,s,d],i)=>{w32(b,8+i*12,f);w32(b,8+i*12+4,s);w32(b,8+i*12+8,d);}); return box('stsc',b);
  }
  function mkStco(offsets) {
    const b = new Uint8Array(8 + offsets.length*4); w32(b,4,offsets.length);
    offsets.forEach((o,i)=>w32(b,8+i*4,o)); return box('stco',b);
  }
  function mkStsz() {
    if (!newStsz) { const b=new Uint8Array(12); w32(b,4,fixedSampleSize); w32(b,8,0); return box('stsz',b); }
    const b=new Uint8Array(12+newStsz.length*4); w32(b,8,newStsz.length);
    newStsz.forEach((s,i)=>w32(b,12+i*4,s)); return box('stsz',b);
  }

  // get movie timescale
  let mvTs=1000;
  { let off=8; while(off+8<=moovU8.length){const sz=u32(moovU8,off),nm=cc(moovU8,off+4);if(sz<8)break;
    if(nm==='mvhd'){const ver=moovU8[off+8]; mvTs=u32(moovU8,off+8+(ver===1?20:12)); break;} off+=sz;} }
  const mvDur = Math.round((clipOut-clipIn)*mvTs);

  // ── walk moov: keep only video trak, rebuild stbl ──
  function isVideoTrak(b, s, e) {
    let off=s; while(off+8<=e){const sz=u32(b,off),nm=cc(b,off+4);if(sz<8)break;
      if(nm==='mdia'){let o2=off+8;while(o2+8<=Math.min(off+sz,e)){const s2=u32(b,o2),n2=cc(b,o2+4);if(s2<8)break;
        if(n2==='hdlr')return cc(b,o2+8+8)==='vide'; o2+=s2;}} off+=sz;} return false;
  }

  function patchDur(orig, ticks) {
    const b = orig.slice(); const ver = b[0];
    if (ver===1){w32(b,24,0);w32(b,28,ticks);}else w32(b,16,ticks);
    return b;
  }

  function walkStbl(b, s, e) {
    const parts=[]; let off=s;
    while(off+8<=e){const sz=u32(b,off),nm=cc(b,off+4);if(sz<8)break;
      const ce=Math.min(off+sz,e);
      if(nm==='stts') parts.push(mkStts());
      else if(nm==='stsc') parts.push(mkStsc());
      else if(nm==='stco'||nm==='co64') ; // skip, add later
      else if(nm==='stsz') parts.push(mkStsz());
      else if(nm==='stss'||nm==='ctts') {} // skip
      else parts.push(b.slice(off,ce));
      off+=sz;}
    return parts;
  }

  function walkMinf(b, s, e) {
    const parts=[]; let off=s;
    while(off+8<=e){const sz=u32(b,off),nm=cc(b,off+4);if(sz<8)break;
      const ce=Math.min(off+sz,e);
      if(nm==='stbl') { const sp=walkStbl(b,off+8,ce); parts.push(box('stbl',...sp)); }
      else parts.push(b.slice(off,ce));
      off+=sz;}
    return parts;
  }

  function walkMdia(b, s, e) {
    const parts=[]; let off=s;
    while(off+8<=e){const sz=u32(b,off),nm=cc(b,off+4);if(sz<8)break;
      const ce=Math.min(off+sz,e);
      if(nm==='mdhd') parts.push(box('mdhd',patchDur(b.slice(off+8,ce), clipTicks)));
      else if(nm==='minf') parts.push(box('minf',...walkMinf(b,off+8,ce)));
      else parts.push(b.slice(off,ce));
      off+=sz;}
    return parts;
  }

  function walkTrak(b, s, e) {
    const parts=[]; let off=s;
    while(off+8<=e){const sz=u32(b,off),nm=cc(b,off+4);if(sz<8)break;
      const ce=Math.min(off+sz,e);
      if(nm==='tkhd') parts.push(box('tkhd',patchDur(b.slice(off+8,ce), mvDur)));
      else if(nm==='mdia') parts.push(box('mdia',...walkMdia(b,off+8,ce)));
      else if(nm==='edts') {} // skip
      else parts.push(b.slice(off,ce));
      off+=sz;}
    return parts;
  }

  // First pass: build moov without stco to measure size
  function buildMoovContent(stcoOffsets) {
    const parts=[]; let off=8;
    while(off+8<=moovU8.length){const sz=u32(moovU8,off),nm=cc(moovU8,off+4);if(sz<8)break;
      const ce=Math.min(off+sz,moovU8.length);
      if(nm==='mvhd'){parts.push(box('mvhd',patchDur(moovU8.slice(off+8,ce),mvDur)));}
      else if(nm==='trak'&&isVideoTrak(moovU8,off+8,ce)){
        const tp=walkTrak(moovU8,off+8,ce);
        if(stcoOffsets) tp.push(mkStco(stcoOffsets));
        else tp.push(mkStco(new Array(CC).fill(0)));
        parts.push(box('trak',...tp));
      }
      // skip non-video traks, udta, meta
      off+=sz;}
    return concat(parts);
  }

  // Measure moov size
  const moovContent0 = buildMoovContent(null);
  const moovSize = 8 + moovContent0.length;
  const ftypSize = ftypU8 ? ftypU8.length : 0;
  const mdatHdrSize = 8;
  const mdatOffset = ftypSize + moovSize + mdatHdrSize;

  // Real stco offsets
  const relOffsets = Array.from({length:CC},(_,i)=>stco[c0+i]-byteStart);
  const finalStco = relOffsets.map(r => r + mdatOffset);
  const moovContent = buildMoovContent(finalStco);
  const moovBox = box('moov', moovContent);

  // Verify size matches
  if (moovBox.length !== moovSize) {
    // Size changed (shouldn't happen) — recalculate
    const mdatOffset2 = ftypSize + moovBox.length + mdatHdrSize;
    const finalStco2 = relOffsets.map(r => r + mdatOffset2);
    const moovContent2 = buildMoovContent(finalStco2);
    const moovBox2 = box('moov', moovContent2);
    const mdatHdr = new Uint8Array(8);
    w32(mdatHdr,0,mdat.length+8); mdatHdr[4]=0x6D;mdatHdr[5]=0x64;mdatHdr[6]=0x61;mdatHdr[7]=0x74;
    const parts2=[]; if(ftypU8)parts2.push(ftypU8); parts2.push(moovBox2,mdatHdr,mdat);
    const mime2=file.type||(file.name.toLowerCase().endsWith('.mov')?'video/quicktime':'video/mp4');
    return new Blob(parts2,{type:mime2});
  }

  // mdat header
  const mdatHdr = new Uint8Array(8);
  w32(mdatHdr,0,mdat.length+8); mdatHdr[4]=0x6D;mdatHdr[5]=0x64;mdatHdr[6]=0x61;mdatHdr[7]=0x74;

  const finalParts = []; if(ftypU8)finalParts.push(ftypU8);
  finalParts.push(moovBox, mdatHdr, mdat);
  const mime=file.type||(file.name.toLowerCase().endsWith('.mov')?'video/quicktime':'video/mp4');
  return new Blob(finalParts,{type:mime});
}

function seekExact(t) {
  return new Promise(resolve => {
    const clamped = Math.max(0, Math.min(duration - 0.001, t));
    if (Math.abs(video.currentTime - clamped) < 0.0001) { resolve(); return; }
    const done = () => { video.removeEventListener('seeked', done); resolve(); };
    video.addEventListener('seeked', done);
    video.currentTime = clamped;
  });
}

// ── Thumbnails ──
async function generateThumbnails() {
  thumbCanvasStrip.innerHTML = '';
  thumbStatus.style.display = 'block';
  thumbStatus.textContent = '生成縮圖中…';
  await new Promise(r => setTimeout(r, 100));

  if (!video.videoWidth || !video.duration) {
    thumbStatus.style.display = 'none'; return;
  }

  const W = thumbnailStrip.offsetWidth || 320;
  const H = thumbnailStrip.offsetHeight || 50;
  const vw = video.videoWidth || 16;
  const vh = video.videoHeight || 9;
  const aspect = vw / vh;
  const tw = Math.round(H * aspect);
  const count = Math.max(6, Math.round(W / tw));

  for (let i = 0; i < count; i++) {
    try {
      await seekExact((i / count) * duration);
      const c = document.createElement('canvas');
      c.width = tw; c.height = H;
      c.getContext('2d').drawImage(video, 0, 0, tw, H);
      c.style.cssText = `width:${tw}px;height:${H}px;flex-shrink:0;`;
      thumbCanvasStrip.appendChild(c);
    } catch(e) {
      // Skip this frame if seek fails
    }
  }

  thumbStatus.style.display = 'none';
  try { await seekExact(0); } catch(e) {}
  updateUI();
}

// ── Play / Pause ──
function setPlayIcon(on) {
  if (on) {
    playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16" fill="#fff" stroke="#fff"/><rect x="14" y="4" width="4" height="16" fill="#fff" stroke="#fff"/>';
    playLabel.textContent = '暫停';
  } else {
    playIcon.innerHTML = '<polygon fill="#fff" stroke="#fff" points="5 3 19 12 5 21 5 3"/>';
    playLabel.textContent = '播放';
  }
  syncMiniPlayIcon(on);
}

playBtn.addEventListener('click', e => { e.stopPropagation(); togglePlay(); });

function togglePlay() {
  if (frameMode) { toggleFrameMode(); hidePanel(); return; }
  if (currentSpeed === 'frame') { toggleFrameMode(); hidePanel(); return; }
  if (video.paused) {
    video.play(); isPlaying = true; setPlayIcon(true); hidePanel();
  } else {
    video.pause(); isPlaying = false; setPlayIcon(false); clearTimeout(autoHideTimer);
  }
}

// ── Frame mode ──
function stopFrameMode() {
  if (frameInterval) { clearInterval(frameInterval); frameInterval = null; }
  frameMode = false;
}
function toggleFrameMode() {
  if (frameMode) { stopFrameMode(); setPlayIcon(false); return; }
  video.pause(); isPlaying = false;
  frameMode = true; setPlayIcon(true);
  const spf = 1 / fps;
  frameInterval = setInterval(() => {
    if (!frameMode) return;
    const next = video.currentTime + spf;
    if (next >= duration) { stopFrameMode(); setPlayIcon(false); return; }
    const done = () => { video.removeEventListener('seeked', done); updateUI(); };
    video.addEventListener('seeked', done);
    video.currentTime = next;
  }, 1000);
}

video.addEventListener('timeupdate', updateUI);
video.addEventListener('ended', () => {
  isPlaying = false; setPlayIcon(false); stopFrameMode(); clearTimeout(autoHideTimer);
});

// ── Speed buttons ──
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    stopFrameMode();
    const s = btn.dataset.speed;
    if (s === 'frame') {
      video.pause(); isPlaying = false; currentSpeed = 'frame'; video.playbackRate = 1;
      toggleFrameMode();
    } else {
      currentSpeed = parseFloat(s);
      video.playbackRate = currentSpeed;
      if (!video.paused) setPlayIcon(true);
    }
    resetAutoHide();
  });
});

// ── ±5s ──
document.getElementById('back5-btn').addEventListener('click', e => {
  e.stopPropagation();
  stopFrameMode(); video.currentTime = Math.max(0, video.currentTime - 5);
  updateUI(); resetAutoHide();
});
document.getElementById('fwd5-btn').addEventListener('click', e => {
  e.stopPropagation();
  stopFrameMode(); video.currentTime = Math.min(duration, video.currentTime + 5);
  updateUI(); resetAutoHide();
});

// ── Prev / Next frame with long-press ──
function stepFrame(dir) {
  stopFrameMode();
  video.pause(); isPlaying = false; setPlayIcon(false);
  video.currentTime = Math.max(0, Math.min(duration, video.currentTime + dir / fps));
  updateUI();
}
function setupLongPress(el, dir) {
  let pt = null, rt = null;
  function start(e) {
    e.preventDefault(); e.stopPropagation();
    stepFrame(dir);
    pt = setTimeout(() => { rt = setInterval(() => stepFrame(dir), 80); }, 380);
  }
  function stop() { clearTimeout(pt); clearInterval(rt); pt = null; rt = null; }
  el.addEventListener('touchstart', start, { passive: false });
  el.addEventListener('touchend', stop);
  el.addEventListener('touchcancel', stop);
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', stop);
  el.addEventListener('mouseleave', stop);
}
setupLongPress(document.getElementById('prev-frame-btn'), -1);
setupLongPress(document.getElementById('next-frame-btn'), +1);
// Wire mini frame buttons with same long-press
setupLongPress(document.getElementById('mini-prev'), -1);
setupLongPress(document.getElementById('mini-next'), +1);

// ── Timeline scrub ──
let isScrubbing = false;
function scrubAt(cx) {
  const r = thumbnailStrip.getBoundingClientRect();
  video.currentTime = Math.max(0, Math.min(1, (cx - r.left) / r.width)) * duration;
  updateUI();
}
thumbnailStrip.addEventListener('touchstart', e => {
  e.stopPropagation(); isScrubbing = true; scrubAt(e.touches[0].clientX);
  stopFrameMode(); video.pause(); isPlaying = false; setPlayIcon(false);
}, { passive: false });
thumbnailStrip.addEventListener('touchmove', e => {
  if (!isScrubbing) return;
  e.preventDefault(); e.stopPropagation();
  scrubAt(e.touches[0].clientX);
}, { passive: false });
thumbnailStrip.addEventListener('touchend', () => isScrubbing = false);
thumbnailStrip.addEventListener('touchcancel', () => isScrubbing = false);
thumbnailStrip.addEventListener('mousedown', e => {
  e.stopPropagation(); isScrubbing = true; scrubAt(e.clientX);
  stopFrameMode(); video.pause(); isPlaying = false; setPlayIcon(false);
});
document.addEventListener('mousemove', e => { if (isScrubbing) scrubAt(e.clientX); });
document.addEventListener('mouseup', () => isScrubbing = false);

// ── Progress bar scrub ──
const progressWrap = document.getElementById('progress-bar-wrap');
function scrubProg(cx) {
  const r = progressWrap.getBoundingClientRect();
  video.currentTime = Math.max(0, Math.min(1, (cx - r.left) / r.width)) * duration;
  updateUI();
}
progressWrap.addEventListener('touchstart', e => {
  e.stopPropagation(); scrubProg(e.touches[0].clientX);
  stopFrameMode(); video.pause(); isPlaying = false; setPlayIcon(false);
}, { passive: true });
progressWrap.addEventListener('touchmove', e => scrubProg(e.touches[0].clientX), { passive: true });
progressWrap.addEventListener('mousedown', e => { e.stopPropagation(); scrubProg(e.clientX); });

// ── Loop range ──
let loopIn = null, loopOut = null, loopActive = false;
const loopRangeOverlay = document.getElementById('loop-range-overlay');
const loopRangeDisplay = document.getElementById('loop-range-display');
const loopToggleBtn    = document.getElementById('loop-toggle');
const loopSetInBtn     = document.getElementById('loop-set-in');
const loopSetOutBtn    = document.getElementById('loop-set-out');

function updateLoopOverlay() {
  if (loopIn !== null && loopOut !== null && duration > 0) {
    const l = (loopIn / duration) * 100;
    const w = ((loopOut - loopIn) / duration) * 100;
    loopRangeOverlay.style.left  = l + '%';
    loopRangeOverlay.style.width = w + '%';
    loopRangeOverlay.classList.add('show');
    loopRangeDisplay.textContent = `${formatTime(loopIn)} → ${formatTime(loopOut)}`;
  } else {
    loopRangeOverlay.classList.remove('show');
    loopRangeDisplay.textContent = '—';
  }
}

loopSetInBtn.addEventListener('click', e => {
  e.stopPropagation();
  loopIn = video.currentTime;
  if (loopOut !== null && loopIn >= loopOut) loopOut = null;
  loopSetInBtn.classList.add('set');
  loopSetOutBtn.classList.toggle('set', loopOut !== null);
  updateLoopOverlay();
  showToast(`IN: ${formatTime(loopIn)}`);
  resetAutoHide();
});

loopSetOutBtn.addEventListener('click', e => {
  e.stopPropagation();
  loopOut = video.currentTime;
  if (loopIn !== null && loopOut <= loopIn) loopIn = null;
  loopSetOutBtn.classList.add('set');
  loopSetInBtn.classList.toggle('set', loopIn !== null);
  updateLoopOverlay();
  showToast(`OUT: ${formatTime(loopOut)}`);
  resetAutoHide();
});

loopToggleBtn.addEventListener('click', e => {
  e.stopPropagation();
  if (loopIn === null || loopOut === null) {
    showToast('請先設定 IN / OUT'); resetAutoHide(); return;
  }
  loopActive = !loopActive;
  loopToggleBtn.classList.toggle('active', loopActive);
  if (loopActive) {
    video.currentTime = loopIn;
    if (video.paused) togglePlay();
    showToast('循環播放開啟');
  } else {
    showToast('循環播放關閉');
  }
  resetAutoHide();
});

document.getElementById('loop-clear').addEventListener('click', e => {
  e.stopPropagation();
  resetLoop();
  showToast('已清除範圍');
  resetAutoHide();
});

// Monitor loop: jump back to IN when OUT is reached
video.addEventListener('timeupdate', () => {
  if (loopActive && loopOut !== null && video.currentTime >= loopOut) {
    video.currentTime = loopIn;
  }
});

// Reset loop when loading new file
function resetLoop() {
  loopIn = null; loopOut = null; loopActive = false;
  loopToggleBtn.classList.remove('active');
  loopSetInBtn.classList.remove('set');
  loopSetOutBtn.classList.remove('set');
  updateLoopOverlay();
}

// ── Save frame PNG ──
document.getElementById('save-btn').addEventListener('click', e => {
  e.stopPropagation();
  video.pause(); isPlaying = false; setPlayIcon(false);
  const w = video.videoWidth, h = video.videoHeight;
  hiddenCanvas.width = w; hiddenCanvas.height = h;
  const ctx = hiddenCanvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(video, 0, 0, w, h);
  const frame = Math.round(video.currentTime * fps);
  const tc = formatTime(video.currentTime).replace(/[:.]/g, '_');
  hiddenCanvas.toBlob(blob => {
    if (!blob) { showToast('截圖失敗'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `frame_${String(frame).padStart(6,'0')}_${tc}.png`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    showToast(`已儲存 Frame ${frame}（PNG）`);
  }, 'image/png');
  resetAutoHide();
});

// Prevent control taps from toggling play
controls.addEventListener('click', e => e.stopPropagation());

// ── Wake Lock: keep screen on while video is loaded ──
let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}
}

async function releaseWakeLock() {
  if (wakeLock) { try { await wakeLock.release(); } catch(e) {} wakeLock = null; }
}

// Re-acquire after tab becomes visible again (iOS releases it on background)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && playerScreen.style.display !== 'none') {
    requestWakeLock();
  }
});

// ── Export clip (FFmpeg.wasm) ──
const exportOverlay   = document.getElementById('export-overlay');
const exportStatus    = document.getElementById('export-status');
const exportProgressF = document.getElementById('export-progress-fill');
const exportCancelBtn = document.getElementById('export-cancel');
let ffmpegInstance = null;
let ffmpegLoaded = false;
let exportCancelled = false;

document.getElementById('loop-export').addEventListener('click', async e => {
  e.stopPropagation();

  if (loopIn === null || loopOut === null) {
    showToast('請先設定 IN / OUT'); return;
  }
  if (!currentFile) { showToast('沒有影片檔案'); return; }

  savePendingClip();

  exportCancelled = false;
  exportOverlay.classList.add('show');
  exportStatus.textContent = '分析影片結構…';
  exportProgressF.style.width = '5%';

  try {
    const srcExt = (currentFile.name.split('.').pop() || 'mp4').toLowerCase();
    const formatSel = document.getElementById('export-format').value;
    const outExt = formatSel === 'original' ? srcExt : formatSel;
    const ss   = loopIn.toFixed(3);
    const base = currentFile.name.replace(/\.[^.]+$/, '') || 'clip';

    let blob;

    if (outExt === srcExt) {
      // ── Pure JS: no FFmpeg needed ──
      exportStatus.textContent = '提取片段…';
      exportProgressF.style.width = '20%';
      blob = await extractClipBlob(currentFile, loopIn, loopOut);
      exportProgressF.style.width = '90%';
      exportStatus.textContent = `輸出 ${(blob.size/1024/1024).toFixed(0)}MB…`;

    } else {
      // ── Format conversion: use FFmpeg ──
      const { createFFmpeg, fetchFile } = FFmpeg;
      exportStatus.textContent = '提取片段…';
      let inputBlob;
      try { inputBlob = await extractClipBlob(currentFile, loopIn, loopOut); }
      catch(e) { inputBlob = currentFile; }
      exportProgressF.style.width = '20%';
      exportStatus.textContent = `轉換格式，載入 FFmpeg…`;

      if (!ffmpegInstance) {
        ffmpegInstance = createFFmpeg({ log:false, corePath: window.location.origin+'/ffmpeg/ffmpeg-core.js' });
      }
      if (!ffmpegLoaded) { await ffmpegInstance.load(); ffmpegLoaded = true; }

      ffmpegInstance.setProgress(({ ratio }) => {
        if (ratio >= 0) exportProgressF.style.width = Math.min(95, 25+Math.round(ratio*70))+'%';
      });

      if (exportCancelled) { exportOverlay.classList.remove('show'); return; }

      const dur = (loopOut - loopIn).toFixed(3);
      const inName = 'input.'+srcExt, outName = 'clip.'+outExt;
      ffmpegInstance.FS('writeFile', inName, await fetchFile(inputBlob));
      await ffmpegInstance.run(
        '-ss', ss, '-i', inName, '-t', dur,
        '-map','0:v:0','-map','0:a:0?',
        '-c:v','libx264','-preset','ultrafast','-crf','18',
        '-c:a','aac','-b:a','128k','-movflags','+faststart', outName
      );
      const data = ffmpegInstance.FS('readFile', outName);
      blob = new Blob([data.buffer], { type: outExt==='mov'?'video/quicktime':'video/mp4' });
      try { ffmpegInstance.FS('unlink', inName); } catch(e2) {}
      try { ffmpegInstance.FS('unlink', outName); } catch(e2) {}
    }

    if (exportCancelled) { exportOverlay.classList.remove('show'); return; }

    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url;
    a.download = `${base}_clip_${ss.replace('.','_')}.${outExt}`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);

    exportProgressF.style.width = '100%';
    exportStatus.textContent = '完成！';
    setTimeout(() => exportOverlay.classList.remove('show'), 1500);
    showToast('剪輯完成');
    clearPendingClip();

  } catch(err) {
    exportOverlay.classList.remove('show');
    showToast('剪輯失敗：' + (err.message || err));
    clearPendingClip();
  }
});

exportCancelBtn.addEventListener('click', () => {
  exportCancelled = true;
  if (ffmpegInstance) { try { ffmpegInstance.exit(); } catch(e) {} }
  ffmpegInstance = null;
  ffmpegLoaded = false;
  exportOverlay.classList.remove('show');
  showToast('已取消');
});

// ── Convert only (no clip, -c copy) ──
document.getElementById('loop-convert').addEventListener('click', async e => {
  e.stopPropagation();
  if (!currentFile) { showToast('沒有影片檔案'); return; }

  const formatSel = document.getElementById('export-format').value;
  const srcExt = currentFile.name.split('.').pop().toLowerCase();
  const outExt = formatSel === 'original' ? srcExt : formatSel;

  if (outExt === srcExt) {
    showToast('格式相同，無需轉換'); return;
  }

  const base = currentFile.name.replace(/\.[^.]+$/, '') || 'video';

  // iPhone MOV ↔ MP4: both are ISOBMFF containers — just rebrand, no FFmpeg needed
  const isISOSwap = (srcExt === 'mov' && outExt === 'mp4') ||
                    (srcExt === 'mp4' && outExt === 'mov');
  if (isISOSwap) {
    const mimeType = outExt === 'mp4' ? 'video/mp4' : 'video/quicktime';
    const blob = new Blob([currentFile], { type: mimeType });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `${base}.${outExt}`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
    showToast(`轉換完成 → ${outExt.toUpperCase()}`);
    return;
  }

  // Other format conversions: use FFmpeg
  const sizeMB2 = currentFile.size / 1024 / 1024;
  const isIOS2 = /iP(hone|ad|od)/.test(navigator.userAgent);
  const limitMB2 = isIOS2 ? 200 : 800;
  if (sizeMB2 > limitMB2) {
    showToast(`檔案 ${sizeMB2.toFixed(0)}MB 太大，${isIOS2 ? 'iOS 建議 200MB 以下' : '建議 800MB 以下'}`);
    return;
  }

  exportCancelled = false;
  exportOverlay.classList.add('show');
  exportStatus.textContent = '準備中…';
  exportProgressF.style.width = '0%';

  try {
    const { createFFmpeg, fetchFile } = FFmpeg;

    if (!ffmpegInstance) {
      ffmpegInstance = createFFmpeg({
        log: false,
        corePath: window.location.origin + '/ffmpeg/ffmpeg-core.js',
      });
    }
    if (!ffmpegLoaded) {
      exportStatus.textContent = '載入 FFmpeg…（首次約需 30 秒）';
      await ffmpegInstance.load();
      ffmpegLoaded = true;
    }

    if (exportCancelled) { exportOverlay.classList.remove('show'); return; }

    exportStatus.textContent = '寫入檔案…';
    exportProgressF.style.width = '10%';

    const inName = 'input.' + srcExt;
    ffmpegInstance.FS('writeFile', inName, await fetchFile(currentFile));

    if (exportCancelled) { exportOverlay.classList.remove('show'); return; }

    exportStatus.textContent = `轉換 ${srcExt.toUpperCase()} → ${outExt.toUpperCase()}…`;
    exportProgressF.style.width = '20%';

    const outName = 'output.' + outExt;
    await ffmpegInstance.run(
      '-i', inName,
      '-c', 'copy',
      '-movflags', '+faststart',
      outName
    );

    if (exportCancelled) { exportOverlay.classList.remove('show'); return; }

    exportProgressF.style.width = '95%';
    exportStatus.textContent = '輸出中…';

    const mimeType = outExt === 'mov' ? 'video/quicktime' : 'video/mp4';
    const data = ffmpegInstance.FS('readFile', outName);
    const blob = new Blob([data.buffer], { type: mimeType });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `${base}.${outExt}`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);

    try { ffmpegInstance.FS('unlink', inName); } catch(e) {}
    try { ffmpegInstance.FS('unlink', outName); } catch(e) {}

    exportProgressF.style.width = '100%';
    exportStatus.textContent = '完成！';
    setTimeout(() => exportOverlay.classList.remove('show'), 1500);
    showToast(`轉換完成 → ${outExt.toUpperCase()}`);
    localStorage.removeItem('pendingClip');

  } catch(err) {
    exportOverlay.classList.remove('show');
    showToast('轉換失敗：' + (err.message || err));
  }
});

// ── Pending clip: save before export, clear after, resume on reload ──
function savePendingClip() {
  if (loopIn === null || loopOut === null || !currentFile) return;
  const existing = JSON.parse(localStorage.getItem('pendingClip') || '{}');
  const crashCount = (existing.crashCount || 0) + 1;
  localStorage.setItem('pendingClip', JSON.stringify({
    loopIn, loopOut,
    fileName: currentFile.name,
    fileSize: currentFile.size,
    format: document.getElementById('export-format').value,
    crashCount,
  }));
}

function clearPendingClip() {
  localStorage.removeItem('pendingClip');
}

// Check for pending clip on load
window.addEventListener('load', () => {
  const raw = localStorage.getItem('pendingClip');
  if (!raw) return;
  try {
    const p = JSON.parse(raw);
    const crashCount = p.crashCount || 1;

    // If crashed too many times, show warning instead of auto-retry option
    const tooManyCrashes = crashCount >= 2;

    const banner = document.createElement('div');
    banner.id = 'resume-banner';
    banner.style.cssText = `
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 99999; background: rgba(10,10,12,0.95);
      border: 1.5px solid rgba(200,255,71,0.4);
      border-radius: 14px; padding: 14px 18px; max-width: 320px; width: 90%;
      font-family: 'DM Mono', monospace; font-size: 12px; color: #fff;
      text-align: center; line-height: 1.7;
    `;
    banner.innerHTML = `
      <div style="color:var(--accent);font-size:13px;margin-bottom:6px">
        ${tooManyCrashes ? '⚠ 多次中斷，建議改用電腦' : '⚠ 上次剪輯未完成'}
      </div>
      <div style="color:rgba(255,255,255,0.6);margin-bottom:10px">
        ${p.fileName}<br>
        IN ${formatTime(p.loopIn)} → OUT ${formatTime(p.loopOut)}<br>
        ${tooManyCrashes ? `<span style="color:rgba(255,100,100,0.8)">已中斷 ${crashCount} 次，檔案可能太大</span>` : ''}
      </div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        ${!tooManyCrashes ? `<button id="resume-select" style="
          background:transparent;border:1.5px solid rgba(200,255,71,0.5);
          border-radius:100px;padding:6px 14px;color:var(--accent);
          font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;">
          重新選擇繼續
        </button>` : ''}
        <button id="resume-cancel" style="
          background:transparent;border:1.5px solid rgba(255,255,255,0.15);
          border-radius:100px;padding:6px 14px;color:rgba(255,255,255,0.4);
          font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;">
          ${tooManyCrashes ? '清除記錄' : '取消'}
        </button>
      </div>
    `;
    document.body.appendChild(banner);

    document.getElementById('resume-cancel').addEventListener('click', () => {
      clearPendingClip();
      banner.remove();
    });

    if (!tooManyCrashes) {
      document.getElementById('resume-select').addEventListener('click', () => {
        banner.remove();
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'video/*';
        inp.style.display = 'none';
        document.body.appendChild(inp);
        inp.addEventListener('change', async () => {
          const file = inp.files[0];
          inp.remove();
          if (!file) return;
          if (file.name !== p.fileName || file.size !== p.fileSize) {
            showToast('請選擇同一支影片：' + p.fileName); return;
          }
          loadVideoFile(file);
          video.addEventListener('canplay', async function once() {
            video.removeEventListener('canplay', once);
            loopIn = p.loopIn;
            loopOut = p.loopOut;
            loopSetInBtn.classList.add('set');
            loopSetOutBtn.classList.add('set');
            updateLoopOverlay();
            document.getElementById('export-format').value = p.format || 'original';
            await new Promise(r => setTimeout(r, 500));
            window._resumeSkipSizeCheck = true;
            document.getElementById('loop-export').click();
          }, { once: true });
        });
        inp.click();
      });
    }
  } catch(e) {
    clearPendingClip();
  }
});
</script>
